name: tether_ghostty
description: "Tether terminal multiplexer with libghostty renderer"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  http: ^1.3.0
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  cupertino_icons: ^1.0.8
  xterm: ^4.0.0
  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  fonts:
    - family: MesloLGSNF
      fonts:
        - asset: fonts/MesloLGSNF-Regular.ttf
    - family: JetBrainsMono
      fonts:
        - asset: fonts/JetBrainsMono-Regular.ttf
